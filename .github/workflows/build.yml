name: Build FFmpeg-Rockchip for RV1126B-P

on:
  push:
    branches: [master]
    tags:
      - 'v*-linux*-ffmpeg*-rkmpp'
      - 'v*-linux*-ffmpeg*-rkmpp-sw'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with built binaries'
        type: boolean
        default: false

env:
  # Version of the sysroot asset stored as a GitHub Release
  # Run `scripts/package-sysroot.sh` locally and upload to a release tagged `sysroot-v1.1.1`
  SYSROOT_VERSION: v1.1.1
  SYSROOT_ASSET_PATTERN: "rv1126b-sysroot-minimal-*.tar.gz"

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: rkmpp
            artifact_suffix: rkmpp
            configure_flags: ""
          - name: rkmpp_software
            artifact_suffix: rkmpp-sw
            configure_flags: "--enable-libx264 --enable-libx265 --enable-libvpx --enable-libaom"
    permissions:
      contents: write   # needed to create releases and upload assets

    steps:
      - name: Select profile for this ref
        id: profile_guard
        run: |
          RUN=false
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if [[ "${{ matrix.profile.name }}" == "rkmpp" && "${GITHUB_REF_NAME}" == *-rkmpp ]]; then
              RUN=true
            elif [[ "${{ matrix.profile.name }}" == "rkmpp_software" && "${GITHUB_REF_NAME}" == *-rkmpp-sw ]]; then
              RUN=true
            fi
          else
            RUN=true
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          echo "Profile=${{ matrix.profile.name }} Ref=${GITHUB_REF_NAME} Run=$RUN"

      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        if: steps.profile_guard.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so `git describe` works

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Install aarch64 cross-compilation toolchain
        if: steps.profile_guard.outputs.run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            pkg-config \
            libpkgconf-dev \
            git \
            make \
            autoconf \
            automake \
            libtool \
            cmake \
            ninja-build \
            perl \
            yasm
          aarch64-linux-gnu-gcc --version

      # ── Sysroot (cache) ──────────────────────────────────────────────────────
      - name: Cache RV1126B-P minimal sysroot
        if: steps.profile_guard.outputs.run == 'true'
        id: cache-sysroot
        uses: actions/cache@v5
        with:
          path: sysroot
          key: rv1126b-sysroot-${{ env.SYSROOT_VERSION }}

      - name: Download RV1126B-P sysroot from GitHub Release
        if: steps.profile_guard.outputs.run == 'true' && steps.cache-sysroot.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading sysroot release asset..."
          gh release download "sysroot-${{ env.SYSROOT_VERSION }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ env.SYSROOT_ASSET_PATTERN }}" \
            --dir /tmp/sysroot-dl/
          mkdir -p sysroot
          tar xzf /tmp/sysroot-dl/rv1126b-sysroot-minimal-*.tar.gz -C sysroot --strip-components=1
          echo "Sysroot contents:"
          ls -la sysroot/usr/include/ sysroot/usr/lib/*.so* 2>/dev/null || ls -la sysroot/

      - name: Build x264 for software profile
        if: steps.profile_guard.outputs.run == 'true' && matrix.profile.name == 'rkmpp_software'
        run: |
          STAGING="$(realpath sysroot)"
          git clone --depth=1 https://code.videolan.org/videolan/x264.git /tmp/x264
          cd /tmp/x264
          ./configure \
            --host=aarch64-linux \
            --cross-prefix=aarch64-linux-gnu- \
            --prefix="${STAGING}/usr" \
            --enable-shared \
            --disable-cli
          make -j"$(nproc)"
          make install

      - name: Build x265 for software profile
        if: steps.profile_guard.outputs.run == 'true' && matrix.profile.name == 'rkmpp_software'
        run: |
          STAGING="$(realpath sysroot)"
          git clone --depth=1 https://bitbucket.org/multicoreware/x265_git.git /tmp/x265
          cmake -S /tmp/x265/source -B /tmp/x265/build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="${STAGING}" \
            -DCMAKE_INSTALL_PREFIX="${STAGING}/usr" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SHARED=ON \
            -DENABLE_STATIC=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_ASSEMBLY=OFF
          cmake --build /tmp/x265/build -j"$(nproc)"
          cmake --install /tmp/x265/build

          # Some x265 CMake revisions build shared libx265 but only install the
          # static archive. If that happens, stage the shared objects manually
          # from the build directory so -lx265 can resolve dynamically.
          if ! ls -1 "${STAGING}/usr/lib"/libx265.so* "${STAGING}/usr/lib64"/libx265.so* >/dev/null 2>&1; then
            if ls -1 /tmp/x265/build/libx265.so* >/dev/null 2>&1; then
              cp -a /tmp/x265/build/libx265.so* "${STAGING}/usr/lib/"
            fi
          fi

          # Discover installed x265 libdir robustly.
          X265_LIBDIR=""
          for d in "${STAGING}/usr/lib" "${STAGING}/usr/lib64"; do
            if ls -1 "${d}/libx265"* >/dev/null 2>&1; then
              X265_LIBDIR="$d"
              break
            fi
          done
          if [ -z "$X265_LIBDIR" ]; then
            echo "ERROR: x265 install completed but no libx265 artifact found in ${STAGING}/usr/lib or ${STAGING}/usr/lib64"
            echo "=== ${STAGING}/usr/lib ==="
            ls -la "${STAGING}/usr/lib" || true
            echo "=== ${STAGING}/usr/lib64 ==="
            ls -la "${STAGING}/usr/lib64" || true
            exit 1
          fi

          X265_SHARED_PRESENT=0
          if ls -1 "${X265_LIBDIR}/libx265.so"* >/dev/null 2>&1; then
            X265_SHARED_PRESENT=1
            if [ ! -e "${X265_LIBDIR}/libx265.so" ]; then
              X265_SOVER="$(ls -1 "${X265_LIBDIR}"/libx265.so.* | sort -V | tail -n 1)"
              ln -sf "$(basename "$X265_SOVER")" "${X265_LIBDIR}/libx265.so"
            fi
            rm -f "${X265_LIBDIR}/libx265.a" "${X265_LIBDIR}/libx265.la"
          fi

          # Always overwrite x265.pc.  x265 is a C++ library so -lstdc++ and -lm
          # must appear in Libs: (not Libs.private) because FFmpeg's configure
          # runs "pkg-config --libs x265" for the link test — Libs.private is
          # only emitted by "pkg-config --libs --static".
          X265_LIBDIR_NAME="$(basename "$X265_LIBDIR")"
          mkdir -p "${X265_LIBDIR}/pkgconfig"
          printf '%s\n' \
            "prefix=${STAGING}/usr" \
            'exec_prefix=${prefix}' \
            "libdir=\${exec_prefix}/${X265_LIBDIR_NAME}" \
            'includedir=${prefix}/include' \
            '' \
            'Name: x265' \
            'Description: H.265/HEVC video encoder' \
            'Version: 3.5' \
            'Libs: -L${libdir} -lx265 -lstdc++ -lm' \
            'Cflags: -I${includedir}' \
            > "${X265_LIBDIR}/pkgconfig/x265.pc"

          cat > /tmp/x265-link-test.c <<'EOF'
          #include <x265.h>
          int main(void) {
            const x265_api *api = x265_api_get(0);
            return api ? 0 : 1;
          }
          EOF
          echo "=== x265 linker sanity test (${X265_LIBDIR}) ==="
          export PKG_CONFIG_DIR=
          export PKG_CONFIG_LIBDIR="${X265_LIBDIR}/pkgconfig"
          if ! aarch64-linux-gnu-gcc /tmp/x265-link-test.c -o /tmp/x265-link-test \
            $(pkg-config --cflags --libs x265) \
            -Wl,-rpath-link,"${X265_LIBDIR}"; then
            echo "ERROR: x265 linker sanity test failed (-lx265 unresolved)"
            echo "=== ${X265_LIBDIR} contents ==="
            ls -la "${X265_LIBDIR}" || true
            exit 1
          fi

          echo "=== x265.pc ==="
          cat "${X265_LIBDIR}/pkgconfig/x265.pc"
          echo "=== x265 installed libs ==="
          ls -la "${X265_LIBDIR}/libx265"* || true
          file -L "${X265_LIBDIR}/libx265.so" 2>/dev/null || file "${X265_LIBDIR}/libx265"*.so* 2>/dev/null || true

      - name: Build libvpx for software profile
        if: steps.profile_guard.outputs.run == 'true' && matrix.profile.name == 'rkmpp_software'
        run: |
          STAGING="$(realpath sysroot)"
          git clone --depth=1 https://chromium.googlesource.com/webm/libvpx /tmp/libvpx
          cd /tmp/libvpx
          export CROSS=aarch64-linux-gnu-
          export CC="${CROSS}gcc"
          export CXX="${CROSS}g++"
          export AR="${CROSS}ar"
          export AS="${CROSS}as"
          export LD="${CROSS}ld"
          export STRIP="${CROSS}strip"
          ./configure \
            --target=arm64-linux-gcc \
            --prefix="${STAGING}/usr" \
            --enable-shared \
            --disable-static \
            --disable-examples \
            --disable-tools \
            --disable-docs \
            --disable-unit-tests \
            --disable-runtime-cpu-detect
          make -j"$(nproc)"
          make install
          file -L "${STAGING}/usr/lib/libvpx.so" | grep -q 'ARM aarch64' || {
            echo "ERROR: libvpx was not cross-compiled for aarch64"
            file -L "${STAGING}/usr/lib/libvpx.so" || true
            exit 1
          }

      - name: Build libaom for software profile
        if: steps.profile_guard.outputs.run == 'true' && matrix.profile.name == 'rkmpp_software'
        run: |
          STAGING="$(realpath sysroot)"
          git clone --depth=1 https://aomedia.googlesource.com/aom /tmp/aom
          cmake -S /tmp/aom -B /tmp/aom/build \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="${STAGING}" \
            -DCMAKE_INSTALL_PREFIX="${STAGING}/usr" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DENABLE_TESTS=0 \
            -DENABLE_TOOLS=0 \
            -DENABLE_DOCS=0 \
            -DENABLE_EXAMPLES=0
          cmake --build /tmp/aom/build -j"$(nproc)"
          cmake --install /tmp/aom/build

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure FFmpeg
        if: steps.profile_guard.outputs.run == 'true'
        run: |
          STAGING="$(realpath sysroot)"
          INSTALL_DIR="$(realpath .)/install"

          # Patch .pc files to embed the absolute staging path as prefix.
          # This is the most reliable approach: pkg-config then emits
          # -L${STAGING}/usr/lib and -I${STAGING}/usr/include directly,
          # with no dependency on PKG_CONFIG_SYSROOT_DIR path rewriting.
          echo "Patching pkg-config files with staging prefix: $STAGING"
          for pcdir in sysroot/usr/lib/pkgconfig sysroot/usr/lib64/pkgconfig sysroot/usr/share/pkgconfig; do
            if [ -d "$pcdir" ]; then
              for pc in "$pcdir"/*.pc; do
                [ -f "$pc" ] || continue
                sed -i "s|^prefix=.*|prefix=${STAGING}/usr|" "$pc"
              done
            fi
          done

          # Create a pkg-config wrapper that restricts to our sysroot only.
          # PKG_CONFIG_DIR= clears the default search path so system .pc files
          # (e.g. host libdrm) cannot interfere.
          PKG_CONFIG_WRAPPER="$(pwd)/aarch64-pkg-config"
          printf '#!/bin/sh\nexport PKG_CONFIG_DIR=\nexport PKG_CONFIG_LIBDIR="%s/usr/lib/pkgconfig:%s/usr/lib64/pkgconfig:%s/usr/share/pkgconfig"\nexec pkg-config "$@"\n' \
            "$STAGING" \
            "$STAGING" \
            "$STAGING" > "$PKG_CONFIG_WRAPPER"
          chmod +x "$PKG_CONFIG_WRAPPER"

          echo "Checking pkg-config wrapper output:"
          "$PKG_CONFIG_WRAPPER" --libs   libdrm && \
          "$PKG_CONFIG_WRAPPER" --cflags libdrm && \
          "$PKG_CONFIG_WRAPPER" --libs   rockchip_mpp && \
          "$PKG_CONFIG_WRAPPER" --libs   librga
          if [ "${{ matrix.profile.name }}" = "rkmpp_software" ]; then
            "$PKG_CONFIG_WRAPPER" --libs x264
            "$PKG_CONFIG_WRAPPER" --libs x265
            "$PKG_CONFIG_WRAPPER" --variable=libdir x265 || true
            "$PKG_CONFIG_WRAPPER" --libs vpx
            "$PKG_CONFIG_WRAPPER" --libs aom
          fi

          # NOTE: No --sysroot. The Ubuntu cross-compiler uses its own multiarch
          # sysroot for libc/libgcc; our minimal sysroot only has MPP/RGA/DRM.
          # We inject our paths via --extra-cflags/-ldflags instead.
          if ! ./configure \
            --prefix="$INSTALL_DIR" \
            --enable-cross-compile \
            --cross-prefix=aarch64-linux-gnu- \
            --arch=aarch64 \
            --target-os=linux \
            --pkg-config="$PKG_CONFIG_WRAPPER" \
            --extra-cflags="-I${STAGING}/usr/include" \
              --extra-ldflags="-L${STAGING}/usr/lib -Wl,-rpath-link,${STAGING}/usr/lib -Wl,--allow-shlib-undefined" \
            --enable-gpl \
            --enable-version3 \
            --enable-libdrm \
            --enable-rkmpp \
            --enable-rkrga \
            ${{ matrix.profile.configure_flags }} \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages; then
            echo ""
            echo "===== ffbuild/config.log (libdrm excerpt) ====="
            grep -nE "libdrm|xf86drm|drmGetVersion|ERROR" ffbuild/config.log | head -200 || true
            echo ""
            echo "===== ffbuild/config.log (tail) ====="
            tail -n 200 ffbuild/config.log || true
            exit 1
          fi

          if [ "${{ matrix.profile.name }}" = "rkmpp_software" ]; then
            grep -q '^#define CONFIG_LIBX264 1' config.h || {
              echo "ERROR: software profile requested but libx264 is not enabled"
              exit 1
            }
            grep -q '^#define CONFIG_LIBX265 1' config.h || {
              echo "ERROR: software profile requested but libx265 is not enabled"
              exit 1
            }
            grep -q '^#define CONFIG_LIBVPX 1' config.h || {
              echo "ERROR: software profile requested but libvpx is not enabled"
              exit 1
            }
            grep -q '^#define CONFIG_LIBAOM 1' config.h || {
              echo "ERROR: software profile requested but libaom is not enabled"
              exit 1
            }
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build FFmpeg
        if: steps.profile_guard.outputs.run == 'true'
        run: make -j$(nproc)

      - name: Install FFmpeg
        if: steps.profile_guard.outputs.run == 'true'
        run: make install

      # ── Verify ───────────────────────────────────────────────────────────────
      - name: Verify cross-compiled binary
        if: steps.profile_guard.outputs.run == 'true'
        run: |
          echo "=== Binary Architecture ==="
          file install/bin/ffmpeg install/bin/ffprobe

          echo ""
          echo "=== Shared Library Dependencies ==="
          aarch64-linux-gnu-readelf -d install/bin/ffmpeg \
            | grep NEEDED | awk '{print $5}' | tr -d '[]'

          echo ""
          echo "=== Binary Sizes ==="
          du -sh install/bin/ffmpeg install/bin/ffprobe

          # Must be aarch64
          file install/bin/ffmpeg | grep -q "ARM aarch64" || \
            { echo "ERROR: Binary is not aarch64!"; exit 1; }

          # Must link against MPP
          aarch64-linux-gnu-readelf -d install/bin/ffmpeg \
            | grep -q "librockchip_mpp" || \
            { echo "ERROR: MPP not linked!"; exit 1; }

          # Must link against RGA
          aarch64-linux-gnu-readelf -d install/bin/ffmpeg \
            | grep -q "librga" || \
            { echo "ERROR: RGA not linked!"; exit 1; }

          echo ""
          echo "✓ Verification passed"

      - name: Summarize enabled codec profile
        if: steps.profile_guard.outputs.run == 'true'
        run: |
          echo "=== Profile: ${{ matrix.profile.name }} ==="
          echo "=== External software codec flags ==="
          grep -E '^#define CONFIG_LIB(X264|X265|VPX|AOM) ' config.h || true
          echo ""
          echo "=== RKMPP codec flags ==="
          grep -E '^#define CONFIG_(H264|HEVC|AV1|VP8|VP9|MJPEG)_RKMPP_(ENCODER|DECODER) ' config.h || true
          echo ""
          echo "=== Linked shared libraries (ffmpeg) ==="
          aarch64-linux-gnu-readelf -d install/bin/ffmpeg \
            | grep NEEDED | awk '{print $5}' | tr -d '[]' \
            | grep -E 'x264|x265|vpx|aom|rockchip_mpp|rga' || true

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package release artifacts
        if: steps.profile_guard.outputs.run == 'true'
        id: package
        run: |
          FFMPEG_VERSION=$(cat RELEASE)
          BUILD_DATE=$(date +%Y%m%d)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TARBALL_NAME="ffmpeg-rv1126b-${{ matrix.profile.artifact_suffix }}-${FFMPEG_VERSION}-${BUILD_DATE}-${COMMIT_SHORT}.tar.gz"

          mkdir -p dist/ffmpeg-rv1126b/bin
          mkdir -p dist/ffmpeg-rv1126b/lib

          # Binaries
          cp install/bin/ffmpeg install/bin/ffprobe dist/ffmpeg-rv1126b/bin/

          # Runtime libraries for software profile (Buildroot image has no ldconfig)
          if [ "${{ matrix.profile.name }}" = "rkmpp_software" ]; then
            for pat in libx264.so* libx265.so* libvpx.so* libaom.so*; do
              cp -a sysroot/usr/lib/${pat} dist/ffmpeg-rv1126b/lib/ 2>/dev/null || true
            done
            for lib in libstdc++.so.6 libgcc_s.so.1 libatomic.so.1; do
              p="$(aarch64-linux-gnu-gcc -print-file-name=${lib})"
              if [ -n "$p" ] && [ "$p" != "$lib" ] && [ -e "$p" ]; then
                cp -a "$p" dist/ffmpeg-rv1126b/lib/
              fi
            done
          fi

          # Wrapper launchers to inject local runtime library path
          cat > dist/ffmpeg-rv1126b/bin/ffmpeg-rv1126b <<'EOF'
          #!/bin/sh
          SELF="$0"
          if command -v readlink >/dev/null 2>&1; then
            RESOLVED="$(readlink -f "$SELF" 2>/dev/null || true)"
            [ -n "$RESOLVED" ] && SELF="$RESOLVED"
          fi
          HERE="$(CDPATH= cd -- "$(dirname "$SELF")" && pwd)"
          export LD_LIBRARY_PATH="${HERE}/../lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/ffmpeg" "$@"
          EOF
          chmod +x dist/ffmpeg-rv1126b/bin/ffmpeg-rv1126b

          cat > dist/ffmpeg-rv1126b/bin/ffprobe-rv1126b <<'EOF'
          #!/bin/sh
          SELF="$0"
          if command -v readlink >/dev/null 2>&1; then
            RESOLVED="$(readlink -f "$SELF" 2>/dev/null || true)"
            [ -n "$RESOLVED" ] && SELF="$RESOLVED"
          fi
          HERE="$(CDPATH= cd -- "$(dirname "$SELF")" && pwd)"
          export LD_LIBRARY_PATH="${HERE}/../lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/ffprobe" "$@"
          EOF
          chmod +x dist/ffmpeg-rv1126b/bin/ffprobe-rv1126b

          # On-device test script
          cp scripts/test-on-device.sh dist/ffmpeg-rv1126b/

          # Quick README for the release tarball
          cat > dist/ffmpeg-rv1126b/README.txt <<EOF
          FFmpeg-Rockchip for RV1126B-P
          FFmpeg version : ${FFMPEG_VERSION}
          Built          : ${BUILD_DATE}
          Commit         : ${COMMIT_SHORT}
          Profile        : ${{ matrix.profile.name }}
          Target         : aarch64 / RV1126B-P (Linux 6.1)
          MPP support    : h264_rkmpp, hevc_rkmpp, av1_rkmpp, vp8_rkmpp, vp9_rkmpp, mjpeg_rkmpp
          RGA filters    : scale_rkrga, vpp_rkrga, overlay_rkrga

          Installation
          ------------
          tar xzf ${TARBALL_NAME} -C /usr/local/

          # Buildroot images typically do not provide ldconfig.
          # Use wrapper launchers (preferred):
          /usr/local/bin/ffmpeg-rv1126b -version

          # Or export runtime path manually:
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH

          Verify
          ------
          /usr/local/bin/ffmpeg-rv1126b -codecs | grep rkmpp
          EOF

          # Create tarball
          tar czf "dist/${TARBALL_NAME}" -C dist ffmpeg-rv1126b/
          sha256sum "dist/${TARBALL_NAME}" > "dist/${TARBALL_NAME}.sha256"

          # Make name available to subsequent steps
          echo "TARBALL_NAME=${TARBALL_NAME}" >> "$GITHUB_ENV"
          echo "FFMPEG_VERSION=${FFMPEG_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"

          echo ""
          echo "=== Packaged artifact ==="
          ls -lh dist/*.tar.gz dist/*.sha256
          cat "dist/${TARBALL_NAME}.sha256"

      # ── Upload workflow artifact ──────────────────────────────────────────────
      - name: Upload build artifact
        if: steps.profile_guard.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-rv1126b-${{ matrix.profile.artifact_suffix }}-${{ env.FFMPEG_VERSION }}-${{ env.BUILD_DATE }}
          path: dist/*.tar.gz
          retention-days: 30

      # ── GitHub Release (on tag push or manual trigger) ────────────────────────
      - name: Create GitHub Release
        if: steps.profile_guard.outputs.run == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', env.BUILD_DATE) }}
          name: FFmpeg-Rockchip ${{ env.FFMPEG_VERSION }} for RV1126B-P
          body: |
            ## FFmpeg-Rockchip ${{ env.FFMPEG_VERSION }} — RV1126B-P Build

            Cross-compiled FFmpeg with Rockchip MPP and RGA hardware acceleration.

            | Property | Value |
            |---|---|
            | Target | RV1126B-P (aarch64 / Linux 6.1) |
            | FFmpeg Version | `${{ env.FFMPEG_VERSION }}` |
            | Build Date | `${{ env.BUILD_DATE }}` |
            | Commit | `${{ github.sha }}` |

            ### Hardware Support
            | Feature | Codecs |
            |---|---|
            | **MPP Decoders** | `h264_rkmpp` `hevc_rkmpp` `av1_rkmpp` `vp8_rkmpp` `vp9_rkmpp` `mjpeg_rkmpp` `mpeg1_rkmpp` `mpeg2_rkmpp` `mpeg4_rkmpp` |
            | **MPP Encoders** | `h264_rkmpp` `hevc_rkmpp` `mjpeg_rkmpp` |
            | **RGA Filters** | `scale_rkrga` `vpp_rkrga` `overlay_rkrga` |

            ### Installation on RV1126B-P
            ```bash
            # Download and extract
            tar xzf ffmpeg-rv1126b-*.tar.gz -C /usr/local/
            ldconfig

            # Verify
            /usr/local/bin/ffmpeg -codecs | grep rkmpp

            # Run hardware tests
            bash /usr/local/test-on-device.sh
            ```

            ### Common Usage
            ```bash
            # Record camera stream (no transcode)
            ffmpeg -rtsp_transport tcp -i rtsp://127.0.0.1:554/live/0 -c copy -t 60 cam.mp4

            # Hardware H.264 encode (1080p real-time)
            ffmpeg -i input.mp4 -c:v h264_rkmpp -b:v 4M output.mp4

            # Hardware scale via RGA
            ffmpeg -i input-4k.mp4 -vf scale_rkrga=1920:1080 -c:v h264_rkmpp output-1080p.mp4
